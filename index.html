<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#0A0A1A"/>
<title>ConnectX - Code se Connect</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Outfit',sans-serif;background:#0A0A1A;height:100dvh;overflow:hidden}
input,button{font-family:'Outfit',sans-serif}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:3px}
@keyframes expand{0%{transform:scale(0.8);opacity:0.5}100%{transform:scale(1.8);opacity:0}}
@keyframes dot{0%,80%,100%{transform:scale(0.5);opacity:0.2}40%{transform:scale(1);opacity:1}}
@keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(102,126,234,0.4)}70%{box-shadow:0 0 0 12px rgba(102,126,234,0)}}
</style>
</head>
<body>
<div id="app"></div>
<script>
var BC=typeof BroadcastChannel!="undefined"?new BroadcastChannel("cx"):null;
var db={
  get:function(k){try{var v=localStorage.getItem(k);return v?JSON.parse(v):null}catch(e){return null}},
  set:function(k,v){try{localStorage.setItem(k,JSON.stringify(v));if(BC)BC.postMessage(k)}catch(e){}}
};
function genCode(){return Math.random().toString(36).substring(2,8).toUpperCase()}
function genId(){return Math.random().toString(36).substring(2,14)}
function nowMs(){return Date.now()}
function fmtTime(ts){return new Date(ts).toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit",hour12:true})}
function fmtSize(b){return b<1024?b+"B":b<1048576?(b/1024).toFixed(1)+"KB":(b/1048576).toFixed(1)+"MB"}
function avColor(n){return"hsl("+((n||"A").charCodeAt(0)*47%360)+",65%,50%)"}
var EMOJIS=["😀","😂","❤️","👍","🔥","😍","🥺","😭","✨","🎉","👋","💯","🙏","😎","🤔","💪","🎊","🌟","😘","🫡"];

var S={
  screen:"splash",myName:"",myId:genId(),roomCode:"",
  messages:[],members:[],input:"",emoji:false,
  call:null,notif:null,tab:"chat",files:[],
  copied:false,incoming:null,secs:0,reply:null,
  reactions:{},prevLen:0,nameIn:"",codeIn:"",
  pt:null,ht:null,ct:null,stream:null
};

var urlCode=new URLSearchParams(location.search).get("join");
if(urlCode)S.codeIn=urlCode.toUpperCase();

function upd(o){Object.assign(S,o);draw()}
function showNotif(t,b){upd({notif:{t:t,b:b}});setTimeout(function(){upd({notif:null})},3200)}

function createRoom(){
  if(!S.nameIn.trim())return;
  var n=S.nameIn.trim(),c=genCode();
  db.set("cx_"+c,{msgs:[],mems:[{id:S.myId,name:n,ls:nowMs()}],files:[],rx:{},call:null});
  startPoll(c);startHeart(c,n);
  upd({myName:n,roomCode:c,messages:[],members:[{id:S.myId,name:n,ls:nowMs()}],screen:"room",prevLen:0});
  showNotif("✅ Room Ready!","Code: "+c);
}

function joinRoom(){
  if(!S.nameIn.trim()||S.codeIn.length<4)return;
  var n=S.nameIn.trim(),c=S.codeIn.toUpperCase();
  var d=db.get("cx_"+c);
  if(!d){showNotif("❌ Error","Room nahi mila! Code check karo.");return}
  startPoll(c);startHeart(c,n);
  upd({myName:n,roomCode:c,messages:d.msgs||[],members:d.mems||[],files:d.files||[],reactions:d.rx||{},screen:"room",prevLen:(d.msgs||[]).length});
  showNotif("🎉 Joined!","Welcome "+n+"!");
}

function startPoll(c){
  if(S.pt)clearInterval(S.pt);
  function p(){
    var d=db.get("cx_"+c);if(!d)return;
    var msgs=d.msgs||[];
    if(msgs.length>S.prevLen){
      msgs.slice(S.prevLen).forEach(function(m){if(m.sid!==S.myId)showNotif(m.sn,m.type==="file"?"📎 "+m.fn:m.text)});
      S.messages=msgs;S.prevLen=msgs.length;
    }
    S.members=(d.mems||[]).filter(function(m){return nowMs()-m.ls<12000});
    if(d.files)S.files=d.files;
    if(d.rx)S.reactions=d.rx;
    if(d.call&&d.call.cid!==S.myId&&!S.call&&nowMs()-d.call.ts<25000)S.incoming=d.call;
    draw();
  }
  S.pt=setInterval(p,1500);
  if(BC)BC.onmessage=function(){p()};
}

function startHeart(c,n){
  if(S.ht)clearInterval(S.ht);
  function b(){
    var d=db.get("cx_"+c)||{msgs:[],mems:[],files:[],rx:{},call:null};
    var o=(d.mems||[]).filter(function(m){return m.id!==S.myId});
    db.set("cx_"+c,Object.assign({},d,{mems:o.concat([{id:S.myId,name:n,ls:nowMs()}])}));
  }
  b();S.ht=setInterval(b,4000);
}

function sendMsg(){
  if(!S.input.trim())return;
  var msg={id:genId(),sid:S.myId,sn:S.myName,text:S.input.trim(),type:"text",ts:nowMs(),rep:S.reply||null};
  var d=db.get("cx_"+S.roomCode)||{msgs:[],mems:[],files:[],rx:{},call:null};
  d.msgs=(d.msgs||[]).concat([msg]);
  db.set("cx_"+S.roomCode,d);
  upd({messages:d.msgs,prevLen:d.msgs.length,input:"",reply:null,emoji:false});
}

function sendFile(file){
  if(!file)return;
  if(file.size>2*1024*1024){showNotif("⚠️ File badi","2MB se chhoti bhejo");return}
  var isI=file.type.startsWith("image/"),isV=file.ty
